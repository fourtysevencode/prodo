name: Build Cross-Platform Apps (Windows, macOS, Linux, Android, iOS)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows'
            os: 'windows-latest'
          - platform: 'macos'
            os: 'macos-latest'
          - platform: 'linux'
            os: 'ubuntu-22.04'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend & Desktop Dependencies
        run: npm ci
        working-directory: desktop

      - name: Build Desktop Application with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: v__VERSION__
          releaseName: 'Prodo v__VERSION__'
          releaseBody: 'Automated release build'
          releaseDraft: true
          prerelease: false

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prodo-${{ matrix.platform }}-app
          path: |
            desktop/src-tauri/target/release/bundle/
            desktop/src-tauri/target/release/*.exe
            desktop/src-tauri/target/release/*.app
            desktop/src-tauri/target/release/*.dmg
            desktop/src-tauri/target/release/*.deb
            desktop/src-tauri/target/release/*.AppImage

  build-native-android:
    name: Build Native Kotlin Android App
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Native Kotlin Android APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
        working-directory: mobile

      - name: Upload Native Kotlin Android APK
        uses: actions/upload-artifact@v4
        with:
          name: prodo-native-kotlin-android-apk
          path: mobile/app/build/outputs/apk/debug/app-debug.apk

  build-tauri-android:
    name: Build Tauri Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & Build-Tools
        run: |
          sdkmanager --install "ndk;25.2.9519653" "build-tools;34.0.0"

      - name: Install Rust Toolchain & Android Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Desktop Dependencies
        run: npm ci
        working-directory: desktop

      - name: Build Android APK with Tauri CLI
        run: npx tauri android build --apk
        working-directory: desktop
        env:
          NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk/25.2.9519653

      - name: Upload Tauri Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: prodo-tauri-android-apk
          path: desktop/src-tauri/gen/android/app/build/outputs/apk/

  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust Toolchain & iOS Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install Desktop Dependencies
        run: npm ci
        working-directory: desktop

      - name: Build iOS App with Tauri CLI
        run: npx tauri ios build --no-bundle
        working-directory: desktop

      - name: Upload iOS Xcode Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prodo-ios-app
          path: desktop/src-tauri/gen/apple/
