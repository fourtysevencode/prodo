<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1E1B4B" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#0F172A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="1"/>
    </radialGradient>

    <!-- Metallic & Neon Gradients -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>

    <linearGradient id="goldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <linearGradient id="focusRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2A6D"/>
      <stop offset="100%" stop-color="#D11149"/>
    </linearGradient>

    <filter id="neonBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGlow)"/>
  <rect x="20" y="20" width="472" height="472" rx="92" fill="none" stroke="url(#cyanGlow)" stroke-width="4" stroke-opacity="0.3"/>

  <!-- Stopwatch Top Crown & Button -->
  <path d="M 236 40 L 276 40 L 276 72 L 236 72 Z" fill="url(#goldGlow)" rx="4"/>
  <rect x="226" y="28" width="60" height="16" rx="6" fill="#F59E0B" filter="url(#neonBlur)"/>
  <path d="M 364 88 L 392 116" stroke="url(#cyanGlow)" stroke-width="14" stroke-linecap="round"/>

  <!-- Clock Outer Dial Ring -->
  <circle cx="256" cy="272" r="160" fill="none" stroke="url(#cyanGlow)" stroke-width="12" stroke-dasharray="32 16" filter="url(#neonBlur)"/>
  <circle cx="256" cy="272" r="124" fill="none" stroke="url(#goldGlow)" stroke-width="6" stroke-opacity="0.8"/>
  <circle cx="256" cy="272" r="116" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6 6" stroke-opacity="0.4"/>

  <!-- Clock Hour Ticks (12, 3, 6, 9) -->
  <line x1="256" y1="124" x2="256" y2="148" stroke="#FF2A6D" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="396" x2="256" y2="420" stroke="url(#cyanGlow)" stroke-width="8" stroke-linecap="round"/>
  <line x1="108" y1="272" x2="132" y2="272" stroke="url(#cyanGlow)" stroke-width="8" stroke-linecap="round"/>
  <line x1="380" y1="272" x2="404" y2="272" stroke="url(#cyanGlow)" stroke-width="8" stroke-linecap="round"/>

  <!-- Stopwatch / Focus Timer Hands -->
  <!-- Hour hand pointing up to 12 / Focus -->
  <line x1="256" y1="272" x2="256" y2="160" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" filter="url(#neonBlur)"/>
  <!-- Minute hand pointing to 2 o'clock -->
  <line x1="256" y1="272" x2="330" y2="210" stroke="url(#cyanGlow)" stroke-width="10" stroke-linecap="round" filter="url(#neonBlur)"/>
  <!-- Second / Focus Pointer Needle -->
  <line x1="256" y1="295" x2="256" y2="135" stroke="url(#focusRed)" stroke-width="5" stroke-linecap="round"/>

  <!-- Center Pivot Pin -->
  <circle cx="256" cy="272" r="16" fill="#F59E0B" filter="url(#neonBlur)"/>
  <circle cx="256" cy="272" r="6" fill="#FFFFFF"/>
</svg>