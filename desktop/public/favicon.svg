<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="classyBg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#18181B"/>
      <stop offset="70%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="champagneGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="50%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#CA8A04"/>
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="url(#classyBg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.12"/>

  <!-- Minimalist Precision Clock Dial -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.2"/>
  <circle cx="256" cy="256" r="142" fill="none" stroke="url(#champagneGold)" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Ultra-fine Ticks -->
  <line x1="256" y1="118" x2="256" y2="134" stroke="url(#champagneGold)" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="378" x2="256" y2="394" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="118" y1="256" x2="134" y2="256" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="378" y1="256" x2="394" y2="256" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Classy Precision Clock Hands -->
  <!-- Hour hand (pointing to 12) -->
  <line x1="256" y1="256" x2="256" y2="152" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 2 o'clock) -->
  <line x1="256" y1="256" x2="336" y2="190" stroke="url(#champagneGold)" stroke-width="5" stroke-linecap="round"/>

  <!-- Center Pivot Pin -->
  <circle cx="256" cy="256" r="9" fill="url(#champagneGold)"/>
  <circle cx="256" cy="256" r="3" fill="#000000"/>
</svg>