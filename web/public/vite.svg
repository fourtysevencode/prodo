<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E1B4B" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#0F172A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="1"/>
    </radialGradient>

    <!-- Accent Gradients -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>

    <linearGradient id="amberGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <linearGradient id="prodoP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E"/>
      <stop offset="50%" stop-color="#E11D48"/>
      <stop offset="100%" stop-color="#BE123C"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Base Card -->
  <rect width="512" height="512" rx="112" fill="url(#bgGlow)"/>
  <rect x="24" y="24" width="464" height="464" rx="92" fill="none" stroke="url(#neonCyan)" stroke-width="4" stroke-opacity="0.35"/>

  <!-- Outer Target Reticle Rings -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="url(#neonCyan)" stroke-width="6" stroke-dasharray="32 20" stroke-opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="132" fill="none" stroke="url(#amberGold)" stroke-width="8" stroke-opacity="0.9"/>
  <circle cx="256" cy="256" r="124" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8 8" stroke-opacity="0.4"/>

  <!-- Reticle Hash Marks -->
  <path d="M 256 48 L 256 96 M 256 416 L 256 464 M 48 256 L 96 256 M 416 256 L 464 256" stroke="url(#neonCyan)" stroke-width="10" stroke-linecap="round"/>

  <!-- Dynamic Icon Monogram 'P' -->
  <g filter="url(#glow)">
    <path d="M 196 144 L 276 144 C 324 144 356 168 356 208 C 356 248 324 272 276 272 L 244 272 L 244 368 C 244 374.6 238.6 380 232 380 L 208 380 C 201.4 380 196 374.6 196 368 L 196 144 Z M 244 186 L 244 230 L 272 230 C 294 230 308 222 308 208 C 308 194 294 186 272 186 L 244 186 Z" fill="url(#prodoP)"/>
  </g>

  <!-- Glowing Center Focus Node -->
  <circle cx="256" cy="256" r="14" fill="#F59E0B" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="6" fill="#FFFFFF"/>
</svg>